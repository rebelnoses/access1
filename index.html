<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>REBEL PARTY 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:#050505;
  color:#f5f5f5;
  font-family:'Barlow',sans-serif;
  overflow:hidden;
}

/* CONTENEDOR */

.container{
  width:100%;
  max-width:650px;
  margin:auto;
  padding:40px 22px 80px;
  text-align:center;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:flex-start;
}

/* LOGO */

#logo img{
  width:clamp(220px,70vw,340px);
  margin-bottom:30px;
}

/* TEXTO INICIAL */

#typedText{
  font-size:1.18rem;
  line-height:1.75;
  white-space:pre-line;
  min-height:330px;
  font-weight:400;
}

/* BOTONES */

.mainBtn{
  margin:25px auto 0;
  width:100%;
  max-width:320px;
  border:none;
  border-radius:14px;
  background:#FFD400;
  color:#000;
  padding:17px 20px;
  font-size:1rem;
  font-weight:700;
  font-family:'Barlow',sans-serif;
  letter-spacing:.5px;
}

/* ACERTIJO */

#acertijo{
  display:none;
  margin-top:35px;
  text-align:left;
  background:rgba(255,212,0,.08);
  border:1px solid rgba(255,212,0,.25);
  border-radius:22px;
  padding:28px 24px;
  backdrop-filter:blur(8px);
}

#acertijo p{
  margin:14px 0;
  font-size:1.05rem;
  line-height:1.65;
}

/* TEXTO AYUDA */

#instruction{
  margin-top:28px;
  text-align:center;
  color:#FFD400;
  font-size:.95rem;
  letter-spacing:.5px;
}

/* INPUT */

#codeInput{
  width:100%;
  margin-top:18px;
  background:transparent;
  border:none;
  border-bottom:2px solid #FFD400;
  color:#FFD400;
  text-align:center;
  outline:none;
  font-size:1.7rem;
  font-family:'Barlow',sans-serif;
  padding:12px;
  letter-spacing:10px;
}

/* FLASH */

#flash{
  position:fixed;
  inset:0;
  background:white;
  opacity:0;
  pointer-events:none;
  z-index:999;
  transition:opacity .3s ease;
}

/* ACCESS SCREEN */

#accessScreen{
  position:fixed;
  inset:0;
  background:black;
  display:none;
  align-items:center;
  justify-content:center;
  z-index:50;
}

#accessText{
  color:#FFD400;
  font-size:3rem;
  font-weight:800;
  letter-spacing:2px;
  opacity:0;
  transform:scale(1.6);
  transition:all .8s cubic-bezier(.18,1.2,.32,1);
}

#accessText.show{
  opacity:1;
  transform:scale(1);
}

/* VIDEO SCREEN */

#videoScreen{
  position:fixed;
  inset:0;
  display:none;
  background:black;
  overflow:hidden;
}

/* VIDEO */

#bgVideo{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* OVERLAY OSCURO */

#videoOverlay{
  position:absolute;
  inset:0;
  background:linear-gradient(
  to top,
  rgba(0,0,0,.88) 0%,
  rgba(0,0,0,.45) 40%,
  rgba(0,0,0,.2) 100%
  );
}

/* TEXTO FINAL */

#finalContent{
  position:absolute;
  inset:auto 0 0 0;
  padding:40px 26px 60px;
  color:white;
  z-index:3;
}

#finalText{
  white-space:pre-line;
  line-height:1.8;
  font-size:1.1rem;
  max-width:650px;
  margin:auto;
  opacity:0;
  transform:translateY(40px);
  transition:all 1.2s ease;
}

/* SHOW */

#finalText.show{
  opacity:1;
  transform:translateY(0);
}

/* REBEL PARTY */

.partyTitle{
  font-size:2.7rem;
  color:#FFD400;
  font-weight:800;
  margin:24px 0;
  letter-spacing:1px;
}

/* INFO */

.eventInfo{
  margin-top:24px;
  font-size:1.1rem;
  line-height:1.9;
}

/* EXTRA */

.small{
  font-size:1rem;
  opacity:.92;
}

/* MOBILE */

@media(max-width:480px){

  #typedText{
    font-size:1.1rem;
    min-height:350px;
  }

  #accessText{
    font-size:2.2rem;
  }

  .partyTitle{
    font-size:2.2rem;
  }

  #finalText{
    font-size:1rem;
  }

}

</style>
</head>

<body>

<div id="flash"></div>

<!-- MAIN -->

<div class="container" id="main">

<div id="logo">
<img src="logo.png">
</div>

<div id="typedText"></div>

<button class="mainBtn" id="continueBtn" style="display:none;">
¡VAMOS A POR ELLO!
</button>

<!-- ACERTIJO -->

<div id="acertijo">

<p><b>A</b>lgunas personas esperan el momento perfecto.</p>

<p><b>C</b>ambiar requiere valentía.</p>

<p><b>T</b>ú decidiste dar el paso.</p>

<p><b>I</b>maginaste una nueva versión de ti.</p>

<p><b>T</b>odo eso merece celebrarse.</p>

<p><b>U</b>na noche especial te espera.</p>

<p><b>D</b>isfruta de la REBEL PARTY.</p>

<div id="instruction">
Introduce la palabra secreta
</div>

<input type="text" id="codeInput" maxlength="7" placeholder="_______">

<button class="mainBtn" id="validateBtn">
PROBAR SUERTE
</button>

</div>

</div>

<!-- ACCESS -->

<div id="accessScreen">

<div id="accessText">
ACCESO DESBLOQUEADO
</div>

</div>

<!-- VIDEO -->

<div id="videoScreen">

<video id="bgVideo" autoplay playsinline>
<source src="Video.mp4" type="video/mp4">
</video>

<div id="videoOverlay"></div>

<div id="finalContent">

<div id="finalText"></div>

</div>

</div>

<script>

/* TEXTO INICIAL */

const text = `No cualquiera recibe esto.

Pero antes de darte acceso a algo muy especial, tendrás que superar un último reto.

Solo quienes sepan mirar más allá descubrirán la clave, que está escondida en el siguiente mensaje.

Encuéntrala y tendrás acceso.`;


/* TEXTO FINAL */

const finalHTML = `¡Te damos la bienvenida a la experiencia más exclusiva de Rebel Noses!

Porque las mejores historias merecen celebrarse juntas.

Estás oficialmente invitada/o a la

<div class="partyTitle">
REBEL PARTY
</div>

<div class="eventInfo">

📅 Viernes, 9 de octubre<br>

📍 Barbillon Marbella<br>

🕗 20:00h<br><br>

<span class="small">
Se ruega puntualidad.<br>
Dress code: actitud obligatoria. Lo demás es opcional.
</span>

<br><br>

🎉 Música, sorpresas y una noche creada para nuestros pacientes más especiales.

</div>`;


/* TYPEWRITER */

let i = 0;

const typedText =
document.getElementById("typedText");

function typeWriter(){

  if(i < text.length){

    typedText.innerHTML += text.charAt(i);

    i++;

    setTimeout(typeWriter,38);

  } else {

    setTimeout(()=>{

      document
      .getElementById("continueBtn")
      .style.display = "block";

    },700);

  }

}

window.onload = typeWriter;


/* CONTINUAR */

document
.getElementById("continueBtn")
.onclick = ()=>{

  document
  .getElementById("acertijo")
  .style.display = "block";

  document
  .getElementById("continueBtn")
  .style.display = "none";

};


/* VALIDAR */

document
.getElementById("validateBtn")
.onclick = ()=>{

  const value =
  document
  .getElementById("codeInput")
  .value
  .toUpperCase();

  if(value === "ACTITUD"){

    startExperience();

  } else {

    document
    .getElementById("codeInput")
    .value = "";

  }

};


/* EXPERIENCIA */

function startExperience(){

  const flash =
  document.getElementById("flash");

  flash.style.opacity = "1";

  setTimeout(()=>{
    flash.style.opacity = "0";
  },250);

  /* ACCESS */

  setTimeout(()=>{

    document
    .getElementById("accessScreen")
    .style.display = "flex";

    setTimeout(()=>{

      document
      .getElementById("accessText")
      .classList
      .add("show");

    },100);

  },250);

  /* PASAR A VIDEO */

  setTimeout(()=>{

    document
    .getElementById("accessScreen")
    .style.display = "none";

    const videoScreen =
    document.getElementById("videoScreen");

    videoScreen.style.display = "block";

    const video =
    document.getElementById("bgVideo");

    /* AUDIO */
    video.muted = false;

    /* TEXTO AL FINAL VIDEO */

    video.onended = ()=>{

      const finalText =
      document.getElementById("finalText");

      finalText.innerHTML = finalHTML;

      setTimeout(()=>{
        finalText.classList.add("show");
      },100);

    };

  },2600);

}

</script>

</body>
</html>
