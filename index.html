<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>REBEL PARTY 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

html, body, button, input, textarea, div, p, span{
  font-family:'Barlow',sans-serif !important;
}

*{box-sizing:border-box;}

body{
  margin:0;
  background:black;
  color:white;
  overflow-x:hidden;
}

/* MAIN */

.container{
  width:100%;
  max-width:650px;
  margin:auto;
  padding:40px 22px 140px;
  text-align:center;
  min-height:100vh;
  transition:.4s ease;
}

/* LOGO */

#logo img{
  width:clamp(240px,72vw,360px);
  margin-bottom:30px;
}

/* TEXTO INICIAL */

#typedText{
  font-size:1.15rem;
  line-height:1.85;
  white-space:pre-line;
  min-height:340px;
}

/* BOTÓN */

.mainBtn{
  margin:25px auto 0;
  width:100%;
  max-width:320px;
  border:none;
  border-radius:14px;
  background:#FFD400;
  color:#000;
  padding:17px 20px;
  font-size:1rem;
  font-weight:700;
}

/* ACERTIJO */

#acertijo{
  display:none;
  margin-top:35px;
  text-align:left;
  background:rgba(255,212,0,.08);
  border-radius:22px;
  padding:28px 24px;
}

#acertijo p{
  margin:14px 0;
  line-height:1.7;
}

/* INPUT */

#codeInput{
  width:100%;
  margin-top:18px;
  background:transparent;
  border:none;
  border-bottom:2px solid #FFD400;
  color:#FFD400;
  text-align:center;
  font-size:1.7rem;
}

/* ACCESS */

#accessScreen{
  position:fixed;
  inset:0;
  background:black;
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  text-align:center;
  padding:30px;
  z-index:100;
}

#accessText{
  color:#FFD400;
  font-size:clamp(2rem,9vw,3.2rem);
  font-weight:800;
  opacity:0;
  transform:scale(1.3);
  transition:.9s;
}

#accessText.show{
  opacity:1;
  transform:scale(1);
}

#welcomeText{
  max-width:500px;
  line-height:1.8;
}

/* VIDEO */

#videoScreen{
  position:fixed;
  inset:0;
  display:none;
}

#bgVideo{
  position:absolute;
  inset:0;
  width:100vw;
  height:100vh;
  object-fit:cover;
}

/* OVERLAY */

#videoOverlay{
  position:absolute;
  inset:0;
  background:linear-gradient(to top, rgba(0,0,0,.85), rgba(0,0,0,.2));
}

/* TEXTOS VIDEO */

.centerText{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  flex-direction:column;
  padding:30px;
  opacity:0;
  transform:translateY(20px);
  transition:1s ease;
}

.centerText.show{
  opacity:1;
  transform:translateY(0);
}

#party{
  font-size:2.5rem;
  font-weight:800;
  color:#FFD400;
}

/* FINAL */

#finalContainer{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  flex-direction:column;
  padding:30px;
  opacity:0;
  transition:1.2s ease;
}

.finalLine{
  margin:10px 0;
  opacity:0;
  transform:translateY(15px);
  transition:1s ease;
}

.finalLine.show{
  opacity:1;
  transform:translateY(0);
}

/* FADE */

#fade{
  position:fixed;
  inset:0;
  background:black;
  opacity:0;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
  transition:2s ease;
}

#fade img{
  width:220px;
  opacity:0;
  transform:scale(1.2);
  transition:1.5s ease;
}

#fade.show img{
  opacity:1;
  transform:scale(1);
}

</style>
</head>

<body>

<div class="container">

<div id="logo">
<img src="logo.png">
</div>

<div id="typedText"></div>

<button class="mainBtn" id="continueBtn" style="display:none;">
¡VAMOS A POR ELLO!
</button>

<div id="acertijo">
<p><b>A</b>lgunas personas esperan el momento perfecto.</p>
<p><b>C</b>ambiar requiere valentía.</p>
<p><b>T</b>ú decidiste dar el paso.</p>
<p><p style="color:#FFD400;">Introduce la palabra secreta</p>
<input id="codeInput">
<button class="mainBtn" id="validateBtn">PROBAR SUERTE</button>
</div>

</div>

<!-- ACCESS -->

<div id="accessScreen">
<div id="accessText">ACCESO DESBLOQUEADO</div>
<div id="welcomeText"></div>
</div>

<!-- VIDEO -->

<div id="videoScreen">

<video id="bgVideo" playsinline>
<source src="Video.mp4">
</video>

<div id="videoOverlay"></div>

<!-- TEXTO 1 -->
<div class="centerText" id="t1">
PORQUE LAS MEJORES HISTORIAS<br>MERECEN CELEBRARSE JUNTAS
</div>

<!-- TEXTO 2 -->
<div class="centerText" id="t2">
ESTÁS OFICIALMENTE INVITADA/O A LA<br>
<div id="party">REBEL PARTY</div>
</div>

<!-- FINAL -->
<div id="finalContainer">

<div class="finalLine" id="f1"></div>
<div class="finalLine" id="f2"></div>
<div class="finalLine" id="f3"></div>
<div class="finalLine" id="f4"></div>
<div class="finalLine" id="f5"></div>
<div class="finalLine" id="f6"></div>
<div class="finalLine" id="f7"></div>

</div>

</div>

<!-- FADE -->
<div id="fade">
<img src="logo.png">
</div>

<script>

/* TYPE */

const text=`No cualquiera recibe esto.

Pero antes tendrás que superar un último reto.`;

let i=0;
function type(){
if(i<text.length){
document.getElementById("typedText").innerHTML+=text[i];
i++;
setTimeout(type,30);
}else{
setTimeout(()=>continueBtn.style.display="block",700);
}
}
type();

/* CONTINUE */

continueBtn.onclick=()=>{
document.getElementById("acertijo").style.display="block";
continueBtn.style.display="none";
};

/* VALIDATE */

validateBtn.onclick=()=>{
if(codeInput.value.toUpperCase()==="ACTITUD"){
document.querySelector(".container").style.opacity="0";
setTimeout(start,300);
}
};

function start(){

/* VIDEO */
setTimeout(()=>{

document.getElementById("accessScreen").style.display="none";
document.getElementById("videoScreen").style.display="block";

let v=document.getElementById("bgVideo");
v.play();

setTimeout(()=>{
document.getElementById("t1").classList.add("show");
},8000);

setTimeout(()=>{
document.getElementById("t2").classList.add("show");
},13000);

/* FINAL TEXT 35s */
setTimeout(()=>{

const lines=[
"Tendrá lugar en...",
"Barbillón Marbella",
"Viernes, 9 de octubre",
"20:00h",
"Se ruega puntualidad",
"Dress code: ACTITUD obligatoria. Lo demás es opcional.",
"Música, sorpresas y una noche creada para nuestros pacientes más especiales."
];

let c=0;

const showNext=()=>{

if(c<lines.length){
document.getElementById("f"+(c+1)).innerText=lines[c];
document.getElementById("f"+(c+1)).classList.add("show");
c++;
setTimeout(showNext,800);
}

};

showNext();

/* FADE FINAL */

setTimeout(()=>{

document.getElementById("fade").classList.add("show");

setTimeout(()=>{
document.querySelector("#fade img").style.opacity="1";
},500);

},5000);

},35000);

},3000);

}

</script>

</body>
</html>
