<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>REBEL PARTY 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:#050505;
  color:#f5f5f5;
  font-family:'Barlow',sans-serif;
  overflow-x:hidden;
}

/* FONDO GENERAL */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
  linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.55)),
  url('lugar.jpg') center/cover no-repeat;
  opacity:.08;
  z-index:-2;
}

/* CONTENEDOR */
.container{
  width:100%;
  max-width:650px;
  margin:auto;
  padding:40px 22px 80px;
  text-align:center;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:flex-start;
}

/* LOGO */
#logo img{
  width:clamp(220px,70vw,340px);
  margin-bottom:30px;
}

/* TEXTO INICIAL */
#typedText{
  font-size:1.18rem;
  line-height:1.75;
  white-space:pre-line;
  min-height:330px;
  font-weight:400;
}

/* BOTONES */
.mainBtn{
  margin:25px auto 0;
  width:100%;
  max-width:320px;
  border:none;
  border-radius:14px;
  background:#FFD400;
  color:#000;
  padding:17px 20px;
  font-size:1rem;
  font-weight:700;
  font-family:'Barlow',sans-serif;
  letter-spacing:.5px;
}

/* ACERTIJO */
#acertijo{
  display:none;
  margin-top:35px;
  text-align:left;
  background:rgba(255,212,0,.08);
  border:1px solid rgba(255,212,0,.25);
  border-radius:22px;
  padding:28px 24px;
  backdrop-filter:blur(8px);
}

#acertijo p{
  margin:14px 0;
  font-size:1.05rem;
  line-height:1.65;
}

/* TEXTO AYUDA */
#instruction{
  margin-top:28px;
  text-align:center;
  color:#FFD400;
  font-size:.95rem;
  letter-spacing:.5px;
}

/* INPUT */
#codeInput{
  width:100%;
  margin-top:18px;
  background:transparent;
  border:none;
  border-bottom:2px solid #FFD400;
  color:#FFD400;
  text-align:center;
  outline:none;
  font-size:1.7rem;
  font-family:'Barlow',sans-serif;
  padding:12px;
  letter-spacing:10px;
}

/* PANTALLA FINAL */
#finalScreen{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

/* FONDO */
#bg{
  position:absolute;
  inset:0;
  background:
  linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.45)),
  url('lugar.jpg') center/cover no-repeat;
  filter:blur(3px) brightness(.78);
  transform:scale(1.04);
}

/* CONTENIDO FINAL */
#finalContent{
  position:relative;
  z-index:2;
  width:100%;
  max-width:700px;
  padding:40px 24px 60px;
  text-align:center;
  color:white;
}

/* TITULO */
#accessTitle{
  font-size:3.2rem;
  color:#FFD400;
  font-weight:800;
  letter-spacing:1px;
  opacity:0;
  transform:translateY(-70px) scale(.85);
  transition:all .9s cubic-bezier(.18,1.2,.32,1);
}

/* SHOW */
#accessTitle.show{
  opacity:1;
  transform:translateY(0) scale(1);
}

/* TEXTO FINAL */
#finalText{
  margin-top:28px;
  white-space:pre-line;
  line-height:1.9;
  font-size:1.18rem;
  font-weight:400;
}

/* REBEL PARTY */
.highlight{
  font-size:2.2rem;
  font-weight:800;
  color:#FFD400;
  margin:18px 0;
}

/* INFO */
.eventInfo{
  margin-top:20px;
  font-size:1.18rem;
  line-height:1.8;
}

/* EXTRA */
.small{
  opacity:.92;
  font-size:1rem;
}

/* FLASH */
#flash{
  position:fixed;
  inset:0;
  background:white;
  opacity:0;
  pointer-events:none;
  z-index:999;
  transition:opacity .25s ease;
}

/* MOBILE */
@media(max-width:480px){

  #typedText{
    font-size:1.1rem;
    min-height:350px;
  }

  #accessTitle{
    font-size:2.4rem;
  }

  #finalText{
    font-size:1.08rem;
  }

  .highlight{
    font-size:1.8rem;
  }

}

</style>
</head>

<body>

<div id="flash"></div>

<div class="container" id="main">

<!-- LOGO -->
<div id="logo">
<img src="logo.png" alt="logo">
</div>

<!-- TEXTO -->
<div id="typedText"></div>

<!-- BOTON -->
<button class="mainBtn" id="continueBtn" style="display:none;">
¡VAMOS A POR ELLO!
</button>

<!-- ACERTIJO -->
<div id="acertijo">

<p><b>A</b>lgunas personas esperan el momento perfecto.</p>

<p><b>C</b>ambiar requiere valentía.</p>

<p><b>T</b>ú decidiste dar el paso.</p>

<p><b>I</b>maginaste una nueva versión de ti.</p>

<p><b>T</b>odo eso merece celebrarse.</p>

<p><b>U</b>na noche especial te espera.</p>

<p><b>D</b>isfruta de la REBEL PARTY.</p>

<div id="instruction">
Introduce la palabra secreta
</div>

<input type="text" id="codeInput" maxlength="7" placeholder="_______">

<button class="mainBtn" id="validateBtn">
PROBAR SUERTE
</button>

</div>

</div>

<!-- FINAL -->
<div id="finalScreen">

<div id="bg"></div>

<div id="finalContent">

<h1 id="accessTitle">
ACCESO DESBLOQUEADO
</h1>

<div id="finalText"></div>

</div>

</div>

<script>

/* TEXTO INICIAL */

const text = `No cualquiera recibe esto.

Pero antes de darte acceso a algo muy especial, tendrás que superar un último reto.

Solo quienes sepan mirar más allá descubrirán la clave, que está escondida en el siguiente mensaje.

Encuéntrala y tendrás acceso.`;


/* TEXTO FINAL */

const finalMessage = `¡Te damos la bienvenida a la experiencia más exclusiva de Rebel Noses!

Porque las mejores historias merecen celebrarse juntas.

Estás oficialmente invitada/o a la`;

const typedText = document.getElementById("typedText");
const continueBtn = document.getElementById("continueBtn");

let i = 0;

/* TYPEWRITER */

function typeWriter(){

  if(i < text.length){

    typedText.innerHTML += text.charAt(i);

    i++;

    setTimeout(typeWriter, 38);

  } else {

    setTimeout(()=>{
      continueBtn.style.display = "block";
    },700);

  }

}

window.onload = typeWriter;


/* CONTINUAR */

continueBtn.onclick = ()=>{

  document.getElementById("acertijo").style.display = "block";

  continueBtn.style.display = "none";

};


/* VALIDAR */

document.getElementById("validateBtn").onclick = ()=>{

  const value = document
  .getElementById("codeInput")
  .value
  .toUpperCase();

  if(value === "ACTITUD"){

    showFinal();

  } else {

    document.getElementById("codeInput").value = "";

  }

};


/* FINAL */

function showFinal(){

  const flash = document.getElementById("flash");

  flash.style.opacity = "1";

  setTimeout(()=>{
    flash.style.opacity = "0";
  },250);

  setTimeout(()=>{

    document.getElementById("finalScreen").style.display = "flex";

    setTimeout(()=>{

      document
      .getElementById("accessTitle")
      .classList
      .add("show");

    },250);

    let j = 0;

    const finalText =
    document.getElementById("finalText");

    function writeFinal(){

      if(j < finalMessage.length){

        finalText.innerHTML += finalMessage.charAt(j);

        j++;

        setTimeout(writeFinal,25);

      } else {

        setTimeout(()=>{

          finalText.innerHTML += `

<div class="highlight">
REBEL PARTY
</div>

<div class="eventInfo">

📅 Viernes, 9 de octubre<br>

📍 Barbillon Marbella<br>

🕘 21:00h<br><br>

<span class="small">
Se ruega puntualidad.<br>
Dress code: actitud obligatoria. Lo demás es opcional.
</span>

<br><br>

🎉 Música, sorpresas y una noche creada para nuestros pacientes más especiales.

</div>

`;

        },400);

      }

    }

    setTimeout(writeFinal,1100);

  },300);

}

</script>

</body>
</html>
